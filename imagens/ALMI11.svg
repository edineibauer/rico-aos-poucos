<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#2a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f85149" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#f85149" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- marca d'água: ticker gigante -->
  <text x="1160" y="580" text-anchor="end"
        font-family="Inter, Arial, sans-serif" font-weight="900" font-size="340"
        fill="#f85149" fill-opacity="0.07">ALMI11</text>

  <!-- top label -->
  <rect x="80" y="80" width="264" height="36" rx="18" ry="18"
        fill="#f85149" fill-opacity="0.18" stroke="#f85149" stroke-opacity="0.4"/>
  <text x="212.0" y="105"
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-weight="700" font-size="16"
        fill="#f85149">PONTO DE ATENÇÃO</text>

  <!-- ticker destaque -->
  <text x="80" y="240"
        font-family="Inter, Arial, sans-serif" font-weight="900" font-size="120"
        fill="#fdfdfd">ALMI11</text>

  <!-- título -->
  <text x="80" y="340"
        font-family="Inter, Arial, sans-serif" font-weight="700" font-size="44"
        fill="#e6edf3">ALMI11: inadimplência 42%, sem dividendos</text>
  <text x="80" y="398"
        font-family="Inter, Arial, sans-serif" font-weight="700" font-size="44"
        fill="#e6edf3">há 7 anos — ainda há o que salvar?</text>

  <!-- divisor -->
  <line x1="80" y1="480" x2="280" y2="480" stroke="#f85149" stroke-width="3"/>

  <!-- rodapé marca -->
  <text x="80" y="540"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="22"
        fill="#8b949e">Rico aos Poucos</text>
  <text x="80" y="568"
        font-family="Inter, Arial, sans-serif" font-weight="400" font-size="18"
        fill="#6e7681">ricoaospoucos.com.br · análise de FIIs com dados oficiais</text>
</svg>
