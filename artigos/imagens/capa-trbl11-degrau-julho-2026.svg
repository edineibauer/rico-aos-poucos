<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1f1408"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="60%" style="stop-color:#d29922"/>
      <stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
    <linearGradient id="cliffGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="48%" style="stop-color:#3fb950"/>
      <stop offset="52%" style="stop-color:#f85149"/>
      <stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid sutil -->
  <g stroke="#30363d" stroke-width="1" opacity="0.2">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- Penhasco (cliff chart) — DPS atual em verde, despencando para vermelho -->
  <g filter="url(#shadow)">
    <!-- Patamar alto (jan-jun) -->
    <rect x="80" y="200" width="500" height="220" fill="#3fb950" opacity="0.85" rx="4"/>
    <!-- Pico extraordinário (jun) — se destaca -->
    <rect x="480" y="120" width="100" height="300" fill="#3fb950" opacity="0.95" rx="4"/>
    <!-- Patamar baixo (jul-dez) -->
    <rect x="600" y="380" width="520" height="40" fill="#f85149" opacity="0.85" rx="4"/>
  </g>

  <!-- Setas de queda -->
  <g stroke="#f85149" stroke-width="3" fill="none" opacity="0.9">
    <path d="M 545 280 L 545 360 L 530 345 M 545 360 L 560 345" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Labels DPS -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" fill="#fff">
    <text x="240" y="180" font-size="36" text-anchor="middle">R$ 0,85</text>
    <text x="240" y="450" font-size="18" font-weight="500" fill="#94a3b8" text-anchor="middle">jan-mai/2026</text>
    <text x="530" y="105" font-size="22" text-anchor="middle" fill="#fbbf24">PICO R$ 2,55</text>
    <text x="530" y="450" font-size="14" font-weight="500" fill="#fbbf24" text-anchor="middle">jun (extraordinária)</text>
    <text x="860" y="370" font-size="36" text-anchor="middle">R$ 0,45</text>
    <text x="860" y="455" font-size="18" font-weight="500" fill="#fca5a5" text-anchor="middle">jul-dez/2026</text>
  </g>

  <!-- Linha do tempo -->
  <line x1="80" y1="490" x2="1120" y2="490" stroke="#30363d" stroke-width="2"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b" font-weight="600">
    <text x="80"   y="514" text-anchor="start">JAN</text>
    <text x="600"  y="514" text-anchor="middle">JUL</text>
    <text x="1120" y="514" text-anchor="end">DEZ/2026</text>
  </g>

  <!-- Header tag -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800">
    <rect x="80" y="50" width="180" height="36" rx="18" fill="rgba(248,81,73,0.18)" stroke="#f85149" stroke-width="1.5"/>
    <text x="170" y="74" font-size="14" letter-spacing="2" fill="#f85149" text-anchor="middle">DEGRAU NO DPS</text>
  </g>

  <!-- Título principal -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" fill="#fff" font-weight="800">
    <text x="80" y="565" font-size="34">TRBL11 cai </text>
    <text x="280" y="565" font-size="34" fill="#f85149">47%</text>
    <text x="370" y="565" font-size="34" fill="#fff"> em julho</text>
  </g>
  <text x="80" y="600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#94a3b8" font-weight="500">
    O gestor já avisou — o mercado ainda está olhando o DPS atual
  </text>

  <!-- Selo Rico aos Poucos -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" opacity="0.7">
    <text x="1120" y="74" font-size="13" letter-spacing="1.5" fill="#94a3b8" text-anchor="end" font-weight="600">RICO AOS POUCOS</text>
  </g>
</svg>
