    .parc-form .calc-field label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .parc-form .input-group { display: flex; align-items: center; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }

    .parc-result { display: none; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; }
    .parc-result.show { display: block; }
    .parc-result h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; color: var(--text-primary); }
    .parc-main-result { text-align: center; padding: 20px; background: rgba(26,95,74,0.12); border: 1px solid rgba(45,138,110,0.3); border-radius: 12px; margin-bottom: 16px; }
    .parc-main-value { font-size: 2rem; font-weight: 800; color: var(--primary-light); }
    .parc-main-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }

    .parc-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .parc-detail { padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; }
    .parc-detail-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .parc-detail-value { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-top: 4px; }

    .parc-detail-value.bad { color: var(--bearish); }
    .parc-verdict { padding: 16px; border-radius: 12px; text-align: center; }
    .parc-verdict.good { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); }
    .parc-verdict.bad { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); }
    .parc-verdict-text { font-size: 0.9rem; font-weight: 600; }
    .parc-verdict.good .parc-verdict-text { color: var(--bullish); }
    .parc-verdict.bad .parc-verdict-text { color: var(--bearish); }
    .parc-verdict-detail { font-size: 0.78rem; color: var(--text-secondary); margin-top: 6px; }
    .parc-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 0.78rem; }
    .parc-table th { text-align: left; padding: 8px 6px; color: var(--text-muted); border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; }
    .parc-table td { padding: 8px 6px; color: var(--text-secondary); border-bottom: 1px solid rgba(255,255,255,0.03); }
    .parc-table .highlight { color: var(--primary-light); font-weight: 600; }
    .parc-table-toggle { display: block; width: 100%; padding: 10px; background: none; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; margin-top: 12px; }

    @media (max-width: 480px) { .parc-details { grid-template-columns: 1fr; } }

    <div class="parc-page">
      <div class="parc-intro">
        <h1>Simulador de Parcelamento</h1>
        <p>Descubra se uma proposta de entrada + parcelas equivale ao valor à vista do seu imóvel, terreno ou veículo.</p>
      </div>

      <div class="parc-form">
        <div class="calc-field">
          <label for="valorVista">Valor desejado à vista</label>
          <div class="input-group">
            <span class="input-prefix">R$</span>
            <input type="text" id="valorVista" value="90.000" inputmode="numeric">
          </div>
        </div>

        <div class="calc-field">
          <label for="entrada">Entrada oferecida</label>
          <div class="input-group">
            <span class="input-prefix">R$</span>
            <input type="text" id="entrada" value="30.000" inputmode="numeric">
          </div>
        </div>

        <div class="calc-field">
          <label for="parcela">Valor da parcela mensal</label>
          <div class="input-group">
            <span class="input-prefix">R$</span>
            <input type="text" id="parcela" value="1.000" inputmode="numeric">
          </div>
        </div>

        <details class="calc-advanced">
          <summary>Opções avançadas</summary>
          <div class="calc-field">
            <label for="taxaMensal">Taxa de rendimento mensal (CDI)</label>
            <div class="input-group">
              <input type="text" id="taxaMensal" value="1,0" inputmode="decimal">
              <span class="input-suffix">% a.m.</span>
            </div>
          </div>
          <div class="calc-field">
            <label for="reajuste">Reajuste anual das parcelas (IGP-M)</label>
            <div class="input-group">
              <input type="text" id="reajuste" value="4,5" inputmode="decimal">
              <span class="input-suffix">% a.a.</span>
            </div>
          </div>
        </details>

        <button class="parc-btn" id="btnCalcular">Calcular</button>
      </div>

      <div class="parc-result" id="resultado"></div>
    </div>

    <div id="footer-container"></div>

  <script defer src="../js/footer.js"></script>
  <script>
  (function() {
    // Máscara de moeda
    function maskCurrency(input) {
      input.addEventListener('input', () => {
        let v = input.value.replace(/\D/g, '');
        v = (parseInt(v) || 0).toString();
        if (v.length <= 3) { input.value = v; return; }
        let formatted = '';
        let count = 0;
        for (let i = v.length - 1; i >= 0; i--) {
          formatted = v[i] + formatted;
          count++;
          if (count % 3 === 0 && i > 0) formatted = '.' + formatted;
        }
        input.value = formatted;
      });
    }

    function parseCurrency(val) {
      return parseInt((val || '0').replace(/\./g, '').replace(/,/g, '')) || 0;
    }

    function parsePercent(val) {
      return parseFloat((val || '0').replace(',', '.')) || 0;
    }

    function formatCurrency(val) {
      return 'R$ ' + Math.round(val).toLocaleString('pt-BR');
    }

    // Aplicar máscaras
    document.querySelectorAll('#valorVista, #entrada, #parcela').forEach(maskCurrency);

    function calcular() {
      const valorVista = parseCurrency(document.getElementById('valorVista').value);
      const entrada = parseCurrency(document.getElementById('entrada').value);
      const parcela = parseCurrency(document.getElementById('parcela').value);
      const taxaMensal = parsePercent(document.getElementById('taxaMensal').value) / 100;
      const reajusteAnual = parsePercent(document.getElementById('reajuste').value) / 100;

      if (valorVista <= 0 || parcela <= 0) return;

      const diferenca = valorVista - entrada;
      if (diferenca <= 0) {
        showResult({ tipo: 'coberto', valorVista, entrada });
        return;
      }

      // Calcular número de parcelas necessárias para igualar o valor presente
      let pvAcumulado = 0;
      let parcelaAtual = parcela;
      let numParcelas = 0;
      let totalPago = entrada;
      const projecao = [];
      const maxParcelas = 600;

      for (let i = 1; i <= maxParcelas; i++) {
        if (i > 1 && (i - 1) % 12 === 0) {
          parcelaAtual = parcela * Math.pow(1 + reajusteAnual, Math.floor((i - 1) / 12));
        }

        const pvParcela = parcelaAtual / Math.pow(1 + taxaMensal, i);
        pvAcumulado += pvParcela;
        totalPago += parcelaAtual;

        // Projeção ano a ano
        if (i % 12 === 0) {
          projecao.push({
            ano: i / 12,
            pvAcumulado: pvAcumulado,
            totalPago: totalPago,
            parcelaAtual: parcelaAtual
          });
        }

        if (pvAcumulado >= diferenca) {
          numParcelas = i;
          break;
        }
      }

      // Se entrada + PV das parcelas cobre o valor
      const pvTotal = entrada + pvAcumulado;
      const naoAtingiu = numParcelas === 0;

      // Cenário à vista: investir tudo
      const saldoVistaFinal = numParcelas > 0 ? valorVista * Math.pow(1 + taxaMensal, numParcelas) : 0;

      // Cenário parcelado: investir entrada + cada parcela recebida
      let saldoParcelado = entrada;
      parcelaAtual = parcela;
      for (let i = 1; i <= numParcelas; i++) {
        if (i > 1 && (i - 1) % 12 === 0) {
          parcelaAtual = parcela * Math.pow(1 + reajusteAnual, Math.floor((i - 1) / 12));
        }
        saldoParcelado = saldoParcelado * (1 + taxaMensal) + parcelaAtual;
      }

      showResult({
        tipo: naoAtingiu ? 'insuficiente' : 'calculado',
        valorVista,
        entrada,
        parcela,
        numParcelas,
        totalPago,
        pvTotal,
        diferenca,
        taxaMensal,
        reajusteAnual,
        saldoVistaFinal,
        saldoParcelado,
        projecao
      });
    }

    function showResult(data) {
      const el = document.getElementById('resultado');
      el.classList.add('show');
      let html = '<h3>Resultado</h3>';

      if (data.tipo === 'coberto') {
        html += `
          <div class="parc-verdict good">
            <div class="parc-verdict-text">A entrada de ${formatCurrency(data.entrada)} já cobre o valor de ${formatCurrency(data.valorVista)}</div>
          </div>`;
        el.innerHTML = html;
        return;
      }

      if (data.tipo === 'insuficiente') {
        html += `
          <div class="parc-verdict bad">
            <div class="parc-verdict-text">Mesmo em 50 anos, as parcelas não cobrem o valor à vista</div>
            <div class="parc-verdict-detail">Aumente o valor da parcela ou da entrada para que a proposta seja viável.</div>
          </div>`;
        el.innerHTML = html;
        return;
      }

      const anos = Math.floor(data.numParcelas / 12);
      const meses = data.numParcelas % 12;
      const tempoStr = anos > 0
        ? `${anos} ano${anos > 1 ? 's' : ''}${meses > 0 ? ` e ${meses} mes${meses > 1 ? 'es' : ''}` : ''}`
        : `${meses} mes${meses > 1 ? 'es' : ''}`;

      html += `
        <div class="parc-main-result">
          <div class="parc-main-value">${data.numParcelas} parcelas</div>
          <div class="parc-main-label">${tempoStr} de parcelamento</div>
          <div class="parc-main-sub">Para que entrada + parcelas equivalham a ${formatCurrency(data.valorVista)} à vista</div>
        </div>

        <div class="parc-details">
          <div class="parc-detail">
            <div class="parc-detail-label">Entrada</div>
            <div class="parc-detail-value">${formatCurrency(data.entrada)}</div>
          </div>
          <div class="parc-detail">
            <div class="parc-detail-label">Parcela inicial</div>
            <div class="parc-detail-value">${formatCurrency(data.parcela)}/mês</div>
          </div>
          <div class="parc-detail">
            <div class="parc-detail-label">Total recebido (nominal)</div>
            <div class="parc-detail-value">${formatCurrency(data.totalPago)}</div>
          </div>
          <div class="parc-detail">
            <div class="parc-detail-label">Diferença vs à vista</div>
            <div class="parc-detail-value ${data.totalPago > data.valorVista ? 'good' : 'bad'}">${data.totalPago > data.valorVista ? '+' : ''}${formatCurrency(data.totalPago - data.valorVista)}</div>
          </div>
        </div>

        <div class="parc-verdict good">
          <div class="parc-verdict-text">Com ${data.numParcelas} parcelas + reajuste anual de ${(data.reajusteAnual * 100).toFixed(1)}%, a proposta equivale ao valor à vista</div>
          <div class="parc-verdict-detail">Você recebe ${formatCurrency(data.totalPago)} no total (${formatCurrency(data.totalPago - data.valorVista)} a mais que o à vista), compensando o custo de oportunidade de ${(data.taxaMensal * 100).toFixed(1)}% a.m.</div>
        </div>
      `;

      // Projeção ano a ano
      if (data.projecao.length > 0) {
        html += `
          <button class="parc-table-toggle" id="toggleProjecao">Ver projeção ano a ano</button>
          <div id="projecaoTable" style="display:none">
            <table class="parc-table">
              <thead>
                <tr>
                  <th>Ano</th>
                  <th>Parcela mensal</th>
                  <th>Valor presente acum.</th>
                  <th>Total pago</th>
                </tr>
              </thead>
              <tbody>
                ${data.projecao.map(p => `
                  <tr>
                    <td>${p.ano}</td>
                    <td>${formatCurrency(p.parcelaAtual)}</td>
                    <td class="highlight">${formatCurrency(p.pvAcumulado + data.entrada)}</td>
                    <td>${formatCurrency(p.totalPago)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      el.innerHTML = html;

      // Toggle projeção
      document.getElementById('toggleProjecao')?.addEventListener('click', () => {
        const table = document.getElementById('projecaoTable');
        const btn = document.getElementById('toggleProjecao');
        if (table.style.display === 'none') {
          table.style.display = 'block';
          btn.textContent = 'Ocultar projeção';
        } else {
          table.style.display = 'none';
          btn.textContent = 'Ver projeção ano a ano';
        }
      });
    }

    document.getElementById('btnCalcular').addEventListener('click', calcular);
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && e.target.closest('.parc-form')) calcular();
    });
  })();
  </script>
