<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <!-- Performance: Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.youtube.com">
  <link rel="dns-prefetch" href="https://www.google-analytics.com">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Artigos e análises sobre investimentos: Bitcoin, FIIs, dólar, ações brasileiras, tesouro direto e muito mais. Educação financeira para independência financeira.">
  <meta name="author" content="Rico aos Poucos">
  <meta name="theme-color" content="#0d1117">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://ricoaospoucos.com.br/artigos/">

  <!-- Hreflang -->

  <!-- Open Graph -->
  <meta property="og:title" content="Artigos de Investimentos e Educação Financeira | Rico aos Poucos">
  <meta property="og:description" content="Artigos educativos sobre investimentos, finanças pessoais e análise de mercado. Bitcoin, FIIs, dólar, ações e muito mais.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ricoaospoucos.com.br/artigos/">
  <meta property="og:image" content="https://ricoaospoucos.com.br/icon-512.png">
  <meta property="og:locale" content="pt_BR">
  <meta property="og:site_name" content="Rico aos Poucos">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@ricoaospoucos">
  <meta name="twitter:title" content="Artigos de Investimentos | Rico aos Poucos">
  <meta name="twitter:description" content="Artigos educativos sobre investimentos, finanças pessoais e análise de mercado.">
  <meta name="twitter:image" content="https://ricoaospoucos.com.br/icon-512.png">

  <!-- Keywords -->
  <meta name="keywords" content="artigos de investimento, educação financeira, análise de mercado, finanças pessoais, renda fixa, renda variável, CDI, Ibovespa, bitcoin, dólar, FIIs, tesouro direto">

  <!-- Favicon - Multiple formats for browser and search engine compatibility -->
  <link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="shortcut icon" href="../icon-192.png">
  <title>Artigos - Rico aos Poucos</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/article-fii.css">
  <style>
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header estilo home */
    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .header-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .header-back:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .header-back svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .app-logo {
      position: relative;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon {
      font-size: 1.4rem;
    }

    .app-title-group {
      flex: 1;
      min-width: 0;
    }

    .app-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-subtitle {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* Main content */
    .main-content {
      flex: 1;
      padding: 16px 20px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* Filtros horizontais */
    .filters-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 20px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filters-row::-webkit-scrollbar {
      display: none;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-chip:hover {
      border-color: var(--primary-light);
      color: var(--text-primary);
    }

    .filter-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Lista de artigos */
    .artigos-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .artigo-card {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
    }

    .artigo-card:hover {
      border-color: var(--primary-light);
      transform: translateY(-2px);
    }

    .artigo-card.destaque {
      border-left: 3px solid var(--primary-light);
      background: linear-gradient(135deg, rgba(26, 95, 74, 0.1) 0%, var(--bg-card) 100%);
    }

    .artigo-card.com-capa {
      flex-direction: column;
      gap: 12px;
    }

    .artigo-card.com-capa .artigo-capa {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .artigo-card.com-capa .artigo-content-row {
      display: flex;
      gap: 16px;
    }

    .artigo-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 50px;
      padding: 10px;
      background: var(--bg-tertiary);
      border-radius: 8px;
    }

    .artigo-date .day {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary-light);
      line-height: 1;
    }

    .artigo-date .month {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .artigo-info {
      flex: 1;
      min-width: 0;
    }

    .artigo-nivel {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .artigo-nivel.iniciante {
      background: rgba(63, 185, 80, 0.15);
      color: var(--bullish);
    }

    .artigo-nivel.intermediario {
      background: rgba(240, 193, 75, 0.15);
      color: var(--neutral);
    }

    .artigo-nivel.avancado {
      background: rgba(248, 81, 73, 0.15);
      color: var(--bearish);
    }

    .artigo-titulo {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 4px;
      line-height: 1.3;
    }

    .artigo-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
      margin: 0 0 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .artigo-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .artigo-tempo {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .artigo-tags {
      display: flex;
      gap: 4px;
    }

    .artigo-tag {
      font-size: 0.6rem;
      padding: 2px 6px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
    }

    /* Footer */
    .page-footer {
      padding: 12px 16px;
      text-align: center;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .footer-youtube {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 6px;
      color: #ff4444;
      font-size: 0.7rem;
      font-weight: 600;
      text-decoration: none;
    }

    .footer-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0;
    }

    @media (max-width: 480px) {
      .artigo-card {
        flex-direction: column;
        gap: 12px;
      }

      .artigo-date {
        flex-direction: row;
        gap: 8px;
        width: fit-content;
        padding: 6px 12px;
      }
    }

    /* Desktop Styles */
    @media (min-width: 768px) {
      .main-content {
        max-width: 900px;
        padding: 20px 32px;
      }
      .filters-row {
        justify-content: center;
        gap: 12px;
      }
      .filter-chip {
        padding: 10px 18px;
        font-size: 0.85rem;
      }
      .artigo-card {
        padding: 20px;
      }
      .artigo-titulo {
        font-size: 1.05rem;
      }
      .artigo-desc {
        font-size: 0.85rem;
      }
    }

    @media (min-width: 1024px) {
      .app-logo { width: 36px; height: 36px; }
      .app-logo svg { width: 36px; height: 36px; }
      .main-content {
        max-width: 1100px;
        padding: 24px 40px;
      }
      .artigos-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      .artigo-card {
        padding: 20px;
        height: 100%;
      }
      .artigo-titulo {
        font-size: 1.1rem;
      }
    }

    @media (min-width: 1400px) {
      .main-content {
        max-width: 1200px;
      }
    }
  </style>

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Artigos - Rico aos Poucos",
    "description": "Artigos educativos sobre investimentos, finanças pessoais e análise de mercado.",
    "url": "https://ricoaospoucos.com.br/artigos/",
    "inLanguage": "pt-BR",
    "isPartOf": {
      "@type": "WebSite",
      "name": "Rico aos Poucos",
      "url": "https://ricoaospoucos.com.br"
    },
    "about": [
      {"@type": "Thing", "name": "Investimentos"},
      {"@type": "Thing", "name": "Finanças Pessoais"},
      {"@type": "Thing", "name": "Educação Financeira"}
    ]
  }
  </script>
</head>
<body>
  <div class="page-wrapper">

    <!-- Header padrão (injetado via js/site-header.js) -->
    <header id="site-header"></header>

    <!-- Main -->
    <main class="main-content">

      <!-- Filtros por Categoria -->
      <div style="margin-bottom: 8px;">
        <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Categoria</span>
      </div>
      <div class="filters-row" id="filtersTema">
        <button class="filter-chip active" data-filter="todos" data-type="tema">Todos</button>
        <button class="filter-chip" data-filter="fiis" data-type="tema">🏢 FIIs</button>
        <button class="filter-chip" data-filter="criptomoedas" data-type="tema">₿ Cripto</button>
        <button class="filter-chip" data-filter="acoes-br" data-type="tema">🇧🇷 Ações BR</button>
        <button class="filter-chip" data-filter="internacional" data-type="tema">🌎 Internacional</button>
        <button class="filter-chip" data-filter="imoveis" data-type="tema">🏠 Imóveis</button>
        <button class="filter-chip" data-filter="tesouro" data-type="tema">💰 Tesouro</button>
        <button class="filter-chip" data-filter="conceitos" data-type="tema">📚 Conceitos</button>
      </div>

      <!-- Lista de Artigos -->
      <div class="artigos-list" id="artigosContainer">
        <div class="loading">Carregando...</div>
      </div>

    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

  </div>

  <script>
    let artigosData = null;
    // filtroNivel removido — não há mais filtro por nível
    let filtroTema = 'todos';

    const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    const niveis = {
      iniciante: { emoji: '🎓', label: 'Iniciante' },
      intermediario: { emoji: '📊', label: 'Intermediário' },
      avancado: { emoji: '🔥', label: 'Avançado' }
    };

    const temas = {
      fiis: { emoji: '🏢', label: 'FIIs' },
      criptomoedas: { emoji: '₿', label: 'Cripto' },
      'acoes-br': { emoji: '🇧🇷', label: 'Ações BR' },
      internacional: { emoji: '🌎', label: 'Internacional' },
      imoveis: { emoji: '🏠', label: 'Imóveis' },
      tesouro: { emoji: '💰', label: 'Tesouro' },
      conceitos: { emoji: '📚', label: 'Conceitos' }
    };

    async function carregarArtigos() {
      try {
        const response = await fetch('../data/artigos.json');
        if (!response.ok) throw new Error('Erro');
        artigosData = await response.json();

        // Verificar se tem filtro na URL
        const params = new URLSearchParams(window.location.search);
        const tema = params.get('tema');

        if (tema) {
          filtroTema = tema;
          document.querySelectorAll('[data-type="tema"]').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === tema);
          });
        }

        renderizarArtigos();
      } catch (error) {
        document.getElementById('artigosContainer').innerHTML = `
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <h3>Erro ao carregar</h3>
            <p>Tente recarregar a pagina.</p>
          </div>
        `;
      }
    }

    function formatarData(dataStr) {
      const data = new Date(dataStr);
      return {
        dia: data.getDate().toString().padStart(2, '0'),
        mes: meses[data.getMonth()]
      };
    }

    function renderizarArtigos() {
      const container = document.getElementById('artigosContainer');
      let artigos = artigosData.artigos;

      // Aplicar filtro de categoria (tema)
      if (filtroTema !== 'todos') {
        artigos = artigos.filter(a => a.tema === filtroTema);
      }

      artigos.sort((a, b) => new Date(b.dataPublicacao) - new Date(a.dataPublicacao));

      if (artigos.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📚</div>
            <h3>Nenhum artigo encontrado</h3>
            <p>Nao ha artigos com esses filtros. Tente outra combinacao.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = artigos.map(artigo => {
        const data = formatarData(artigo.dataPublicacao);
        const nivel = niveis[artigo.nivel];
        const tema = artigo.tema ? temas[artigo.tema] : null;
        const destaqueClass = artigo.destaque ? 'destaque' : '';
        const temCapa = artigo.capa ? 'com-capa' : '';

        // Badge de tema (se existir)
        const temaBadge = tema ? `<span class="artigo-nivel" style="background: rgba(88, 166, 255, 0.15); color: #58a6ff;">${tema.emoji} ${tema.label}</span>` : '';

        if (artigo.capa) {
          return `
            <a href="${artigo.arquivo}" class="artigo-card ${destaqueClass} ${temCapa}" data-nivel="${artigo.nivel}" data-tema="${artigo.tema || ''}">
              <img decoding="async" src="../${artigo.capa}" alt="${artigo.titulo}" class="artigo-capa" loading="lazy">
              <div class="artigo-content-row">
                <div class="artigo-date">
                  <span class="day">${data.dia}</span>
                  <span class="month">${data.mes}</span>
                </div>
                <div class="artigo-info">
                  <div style="display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap;">
                    <span class="artigo-nivel ${artigo.nivel}">${nivel.emoji} ${nivel.label}</span>
                    ${temaBadge}
                  </div>
                  <h3 class="artigo-titulo">${artigo.titulo}</h3>
                  <p class="artigo-desc">${artigo.descricao}</p>
                  <div class="artigo-meta">
                    <span class="artigo-tempo">${artigo.tempoLeitura} min</span>
                    <div class="artigo-tags">
                      ${artigo.tags.slice(0, 2).map(tag => `<span class="artigo-tag">${tag}</span>`).join('')}
                    </div>
                  </div>
                </div>
              </div>
            </a>
          `;
        }

        return `
          <a href="${artigo.arquivo}" class="artigo-card ${destaqueClass}" data-nivel="${artigo.nivel}" data-tema="${artigo.tema || ''}">
            <div class="artigo-date">
              <span class="day">${data.dia}</span>
              <span class="month">${data.mes}</span>
            </div>
            <div class="artigo-info">
              <div style="display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap;">
                <span class="artigo-nivel ${artigo.nivel}">${nivel.emoji} ${nivel.label}</span>
                ${temaBadge}
              </div>
              <h3 class="artigo-titulo">${artigo.titulo}</h3>
              <p class="artigo-desc">${artigo.descricao}</p>
              <div class="artigo-meta">
                <span class="artigo-tempo">${artigo.tempoLeitura} min</span>
                <div class="artigo-tags">
                  ${artigo.tags.slice(0, 2).map(tag => `<span class="artigo-tag">${tag}</span>`).join('')}
                </div>
              </div>
            </div>
          </a>
        `;
      }).join('');
    }

    // Filtros de Categoria
    document.getElementById('filtersTema').addEventListener('click', (e) => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;

      filtroTema = chip.dataset.filter;
      document.querySelectorAll('[data-type="tema"]').forEach(btn => {
        btn.classList.toggle('active', btn === chip);
      });
      renderizarArtigos();
    });

    document.addEventListener('DOMContentLoaded', carregarArtigos);
  </script>
  <script defer src="../js/site-header.js"></script>
  <script defer src="../js/footer.js"></script>
  <script defer src="../js/i18n.js"></script>
</body>
</html>
