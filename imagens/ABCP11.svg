<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0d1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- marca d'água: ticker gigante -->
  <text x="1160" y="580" text-anchor="end"
        font-family="Inter, Arial, sans-serif" font-weight="900" font-size="340"
        fill="#58a6ff" fill-opacity="0.07">ABCP11</text>

  <!-- top label -->
  <rect x="80" y="80" width="278" height="36" rx="18" ry="18"
        fill="#58a6ff" fill-opacity="0.18" stroke="#58a6ff" stroke-opacity="0.4"/>
  <text x="219.0" y="105"
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif" font-weight="700" font-size="16"
        fill="#58a6ff">DOSSIÊ ATUALIZADO</text>

  <!-- ticker destaque -->
  <text x="80" y="240"
        font-family="Inter, Arial, sans-serif" font-weight="900" font-size="120"
        fill="#fdfdfd">ABCP11</text>

  <!-- título -->
  <text x="80" y="340"
        font-family="Inter, Arial, sans-serif" font-weight="700" font-size="44"
        fill="#e6edf3">ABCP11: taxa de 0,1%, ocupação 98,8% —</text>
  <text x="80" y="398"
        font-family="Inter, Arial, sans-serif" font-weight="700" font-size="44"
        fill="#e6edf3">o processo de R$221 MI já está no preço?</text>

  <!-- divisor -->
  <line x1="80" y1="480" x2="280" y2="480" stroke="#58a6ff" stroke-width="3"/>

  <!-- rodapé marca -->
  <text x="80" y="540"
        font-family="Inter, Arial, sans-serif" font-weight="600" font-size="22"
        fill="#8b949e">Rico aos Poucos</text>
  <text x="80" y="568"
        font-family="Inter, Arial, sans-serif" font-weight="400" font-size="18"
        fill="#6e7681">ricoaospoucos.com.br · análise de FIIs com dados oficiais</text>
</svg>
